<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剩余价值计算器</title>
    <meta name="description" content="VPS 剩余价值计算器，支持按天折算、11种货币实时汇率、溢价分析。">
    <meta property="og:title" content="剩余价值计算器">
    <meta property="og:description" content="VPS 剩余价值计算器，支持按天折算、11种货币实时汇率、溢价分析。">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="date"]::-webkit-inner-spin-button,
        input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0.5; cursor: pointer;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }

        html.dark body { background-color: #0f172a; color: #f1f5f9; }
        html.dark .bg-white { background-color: #1e293b; }
        html.dark .bg-slate-50 { background-color: #0f172a; }
        html.dark .bg-slate-100 { background-color: #334155; }
        html.dark .bg-slate-200 { background-color: #475569; }
        html.dark .text-slate-800 { color: #f1f5f9; }
        html.dark .text-slate-700 { color: #e2e8f0; }
        html.dark .text-slate-600 { color: #94a3b8; }
        html.dark .text-slate-500 { color: #94a3b8; }
        html.dark .text-slate-400 { color: #64748b; }
        html.dark .text-slate-200 { color: #e2e8f0; }
        html.dark .text-red-500 { color: #f87171; }
        html.dark .text-emerald-500 { color: #34d399; }
        html.dark .text-purple-600 { color: #a78bfa; }
        html.dark .border-slate-100 { border-color: #334155; }
        html.dark .border-slate-200 { border-color: #475569; }
        html.dark .border-slate-50 { border-color: #334155; }
        html.dark .hover\:bg-slate-200:hover { background-color: #475569; }
        html.dark .hover\:bg-slate-300:hover { background-color: #475569; }
        html.dark .hover\:text-slate-600:hover { color: #cbd5e1; }
        html.dark input, html.dark select { background-color: #1e293b; border-color: #475569; color: #f1f5f9; }
        html.dark #currencyModal > div { background-color: #1e293b; }
        html.dark #convResultBox { background-color: #0f172a; border-color: #475569; }
        html.dark .bg-slate-900\/40 { background-color: rgba(0, 0, 0, 0.7); }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen text-slate-800 p-4 md:p-8 font-sans">
    
    <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-12 gap-6 relative">
        
        <div class="md:col-span-7 bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex items-center gap-3 mb-8 flex-wrap">
                <h1 class="text-xl font-bold text-slate-800 mr-2">剩余价值计算器</h1>
                <button onclick="openModal()" class="px-3 py-1 bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium rounded transition-colors shadow-sm">
                    货币转换
                </button>
                <button class="px-3 py-1 bg-orange-500 text-white text-sm font-medium rounded shadow-sm cursor-default">
                    计算器
                </button>
                <button onclick="toggleDark()" class="px-3 py-1 bg-slate-200 hover:bg-slate-300 text-slate-600 text-sm font-medium rounded transition-colors shadow-sm" title="切换暗黑模式">
                    <svg id="moonIcon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg id="sunIcon" class="w-4 h-4 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
                <span id="apiStatus" class="text-xs text-slate-400 ml-auto w-full md:w-auto mt-2 md:mt-0 text-right">
                    <span class="inline-block w-3 h-3 border-2 border-slate-400 border-t-transparent rounded-full animate-spin align-middle mr-1"></span>
                    <span class="align-middle">正在获取汇率...</span>
                </span>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-800 mb-1">
                        参考汇率 
                        <span id="rateUpdateTime" class="text-xs text-slate-500 font-normal block mt-0.5 mb-2"></span>
                    </label>
                    <input type="number" id="exchangeRate" step="0.0001" class="block w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 transition-colors text-sm">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1">原币种</label>
                        <select id="vpsCurrency" onchange="updateRateDisplay()" class="block w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 cursor-pointer text-sm shadow-sm">
                            <option value="USD" selected>美元 (USD)</option>
                            <option value="CNY">人民币 (CNY)</option>
                            <option value="GBP">英镑 (GBP)</option>
                            <option value="EUR">欧元 (EUR)</option>
                            <option value="JPY">日元 (JPY)</option>
                            <option value="KRW">韩元 (KRW)</option>
                            <option value="HKD">港元 (HKD)</option>
                            <option value="TWD">新台币 (TWD)</option>
                            <option value="CAD">加拿大元 (CAD)</option>
                            <option value="SGD">新加坡元 (SGD)</option>
                            <option value="AUD">澳大利亚元 (AUD)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1">交易/结算币种</label>
                        <select id="targetCurrency" onchange="updateRateDisplay()" class="block w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 cursor-pointer text-sm shadow-sm">
                            <option value="CNY" selected>人民币 (CNY)</option>
                            <option value="USD">美元 (USD)</option>
                            <option value="GBP">英镑 (GBP)</option>
                            <option value="EUR">欧元 (EUR)</option>
                            <option value="JPY">日元 (JPY)</option>
                            <option value="KRW">韩元 (KRW)</option>
                            <option value="HKD">港元 (HKD)</option>
                            <option value="TWD">新台币 (TWD)</option>
                            <option value="CAD">加拿大元 (CAD)</option>
                            <option value="SGD">新加坡元 (SGD)</option>
                            <option value="AUD">澳大利亚元 (AUD)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-800 mb-1">续费金额 (原币种)</label>
                    <input type="number" id="price" step="0.01" class="block w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 transition-colors text-sm shadow-sm" placeholder="如: 39.9">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1">付款周期</label>
                        <select id="cycle" class="block w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 cursor-pointer text-sm shadow-sm">
                            <option value="1">月付</option>
                            <option value="3">季付</option>
                            <option value="6">半年付</option>
                            <option value="12" selected>年付</option>
                            <option value="24">两年付</option>
                            <option value="36">三年付</option>
                            <option value="60">五年付</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1">到期时间</label>
                        <input type="date" id="endDate" class="block w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm shadow-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1">交易日期</label>
                        <input type="date" id="todayDate" class="block w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-800 mb-1">实际成交金额 (可选)</label>
                        <input type="number" id="actualPrice" step="0.01" class="block w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 transition-colors text-sm shadow-sm" placeholder="计算溢价用">
                    </div>
                </div>

                <button onclick="calculate()" class="w-full mt-6 flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition-colors">
                    计算剩余价值
                </button>
            </div>
        </div>

        <div class="md:col-span-5 space-y-6">
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 h-full flex flex-col">
                <h2 class="text-lg font-bold text-slate-800 mb-6 text-center">计算结果</h2>
                
                <div class="space-y-4 flex-1">
                    <div class="flex justify-between items-center border-b border-slate-50 pb-3">
                        <span class="text-sm font-medium text-slate-500">剩余天数</span>
                        <span class="font-semibold text-slate-800"><span id="resRemainDays">-</span> 天</span>
                    </div>
                    
                    <div class="flex justify-between items-center border-b border-slate-50 pb-3">
                        <span class="text-sm font-medium text-slate-500">剩余价值</span>
                        <span class="font-bold text-lg text-purple-600"><span id="resValueSymbol"></span> <span id="resValue">-</span></span>
                    </div>

                    <div class="flex justify-between items-center border-b border-slate-50 pb-3">
                        <span class="text-sm font-medium text-slate-500">交易金额</span>
                        <span class="font-semibold text-slate-800"><span id="resActualSymbol"></span> <span id="resActual">-</span></span>
                    </div>

                    <div class="flex justify-between items-center pt-1">
                        <span class="text-sm font-medium text-slate-500">溢价情况</span>
                        <span class="font-bold text-lg" id="resPremiumWrap"><span id="resPremium">-</span></span>
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col items-center">
                    <h3 class="text-sm font-bold text-slate-700 mb-4">分享功能</h3>
                    <button onclick="copyResultText()" class="px-6 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium rounded-lg transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        复制文本
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="currencyModal" class="fixed inset-0 bg-slate-900/40 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 relative">
            <button onclick="closeModal()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <h2 class="text-lg font-bold text-slate-800 mb-6">货币转换器</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">金额</label>
                    <input type="number" id="convAmount" step="0.01" class="block w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="输入金额">
                </div>
                
                <div class="flex items-center gap-2">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-slate-600 mb-1">从</label>
                        <select id="convFrom" class="block w-full px-2 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"></select>
                    </div>
                    
                    <button onclick="swapCurrency()" class="mt-6 p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-500 transition-colors" title="互换币种">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    </button>

                    <div class="flex-1">
                        <label class="block text-sm font-medium text-slate-600 mb-1">到</label>
                        <select id="convTo" class="block w-full px-2 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"></select>
                    </div>
                </div>

                <div id="modalRateHint" class="text-center text-sm font-medium text-slate-500 mt-2 h-5"></div>

                <button onclick="convertCurrency()" class="w-full mt-2 py-3 px-4 rounded-lg shadow-sm text-sm font-medium text-white bg-blue-500 hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    转换
                </button>

                <div id="convResultBox" class="mt-4 p-4 bg-slate-50 border border-slate-100 rounded-lg hidden">
                    <div class="text-sm text-slate-500 mb-1">结果</div>
                    <div class="text-2xl font-bold text-slate-800" id="convResultText">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let globalRates = {};

        const currencyOptionsHTML = `
            <option value="CNY">人民币 (CNY)</option>
            <option value="USD">美元 (USD)</option>
            <option value="GBP">英镑 (GBP)</option>
            <option value="EUR">欧元 (EUR)</option>
            <option value="JPY">日元 (JPY)</option>
            <option value="KRW">韩元 (KRW)</option>
            <option value="HKD">港元 (HKD)</option>
            <option value="TWD">新台币 (TWD)</option>
            <option value="CAD">加拿大元 (CAD)</option>
            <option value="SGD">新加坡元 (SGD)</option>
            <option value="AUD">澳大利亚元 (AUD)</option>
        `;

        const currencySymbols = { CNY: '\u00a5', USD: '$', EUR: '\u20ac', GBP: '\u00a3', JPY: '\u00a5', KRW: '\u20a9', HKD: 'HK$', SGD: 'S$', AUD: 'A$', CAD: 'C$', TWD: 'NT$' };

        const STORAGE_KEYS = ['price','cycle','endDate','todayDate','vpsCurrency','targetCurrency','exchangeRate','actualPrice'];

        function saveInputs() {
            STORAGE_KEYS.forEach(id => {
                const el = document.getElementById(id);
                if (el) localStorage.setItem('calc_'+id, el.value);
            });
        }

        function restoreInputs() {
            STORAGE_KEYS.forEach(id => {
                const v = localStorage.getItem('calc_'+id);
                if (v) {
                    const el = document.getElementById(id);
                    if (el.type === 'date') el.valueAsDate = new Date(v);
                    else el.value = v;
                }
            });
        }

        function addAutoSave() {
            STORAGE_KEYS.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('change', saveInputs);
            });
        }

        function parseURLParams() {
            const params = new URLSearchParams(window.location.search);
            let restored = false;
            STORAGE_KEYS.forEach(id => {
                const v = params.get(id);
                if (v) {
                    const el = document.getElementById(id);
                    if (el) {
                        if (el.type === 'date') el.valueAsDate = new Date(v);
                        else el.value = v;
                        restored = true;
                    }
                }
            });
            return restored;
        }

        function initDefaults() {
            const today = new Date();
            const todayEl = document.getElementById('todayDate');
            const endEl = document.getElementById('endDate');
            if (!todayEl.value) todayEl.valueAsDate = today;
            if (!endEl.value) endEl.valueAsDate = new Date(today.getFullYear() + 1, today.getMonth(), today.getDate());
        }

        document.getElementById('convFrom').innerHTML = currencyOptionsHTML;
        document.getElementById('convTo').innerHTML = currencyOptionsHTML;
        document.getElementById('convFrom').value = 'USD';
        document.getElementById('convTo').value = 'CNY';

        function updateLoading(loading) {
            const apiEl = document.getElementById('apiStatus');
            if (loading) {
                apiEl.innerHTML = '<span class="inline-block w-3 h-3 border-2 border-slate-400 border-t-transparent rounded-full animate-spin align-middle mr-1"></span><span class="align-middle">正在获取汇率...</span>';
            }
        }

        async function fetchRates() {
            updateLoading(true);
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                if(data && data.rates) {
                    globalRates = data.rates;
                    localStorage.setItem('calc_cachedRates', JSON.stringify(data.rates));
                    localStorage.setItem('calc_cachedRatesTime', Date.now());
                    document.getElementById('apiStatus').innerHTML = '<span class="align-middle">汇率已更新</span>';
                    
                    const date = new Date();
                    const formattedDate = `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
                    document.getElementById('rateUpdateTime').innerText = `(更新时间${formattedDate} (ExchangeRate-API))`;

                    updateRateDisplay();
                    updateModalRateHint();
                }
            } catch (error) {
                console.error("汇率获取失败:", error);
                const cached = localStorage.getItem('calc_cachedRates');
                if (cached) {
                    globalRates = JSON.parse(cached);
                    const cachedTime = localStorage.getItem('calc_cachedRatesTime');
                    const timeStr = cachedTime ? new Date(parseInt(cachedTime)).toLocaleDateString() : '未知';
                    document.getElementById('apiStatus').innerHTML = '<span class="align-middle">使用缓存汇率</span>';
                    document.getElementById('rateUpdateTime').innerText = `(缓存时间 ${timeStr})`;
                    updateRateDisplay();
                    updateModalRateHint();
                } else {
                    document.getElementById('apiStatus').innerHTML = '<span class="align-middle text-red-500">获取失败，请手动输入汇率</span>';
                    document.getElementById('rateUpdateTime').innerText = '(获取失败)';
                }
            }
        }

        function updateRateDisplay() {
            const vpsCurr = document.getElementById('vpsCurrency').value;
            const targetCurr = document.getElementById('targetCurrency').value;

            if (Object.keys(globalRates).length > 0) {
                const rateVPS = globalRates[vpsCurr];
                const rateTarget = globalRates[targetCurr];
                const crossRate = rateTarget / rateVPS;
                document.getElementById('exchangeRate').value = crossRate.toFixed(4);
                saveInputs();
            }
        }

        function calculate() {
            const price = parseFloat(document.getElementById('price').value);
            const cycleMonths = parseInt(document.getElementById('cycle').value);
            const endDate = new Date(document.getElementById('endDate').value);
            const todayDate = new Date(document.getElementById('todayDate').value);
            const exchangeRate = parseFloat(document.getElementById('exchangeRate').value);
            const actualPrice = parseFloat(document.getElementById('actualPrice').value);
            
            const targetCurr = document.getElementById('targetCurrency').value;
            const symbol = currencySymbols[targetCurr] || '';

            if (isNaN(price) || isNaN(exchangeRate) || !endDate.getTime() || !todayDate.getTime()) {
                alert("⚠️ 请完整填写【续费金额】和【日期】信息！");
                return;
            }

            const startDate = new Date(endDate);
            startDate.setMonth(startDate.getMonth() - cycleMonths);

            const msPerDay = 1000 * 60 * 60 * 24;
            const totalDays = Math.round((endDate - startDate) / msPerDay);
            let remainDays = Math.round((endDate - todayDate) / msPerDay);

            if (remainDays < 0) remainDays = 0;
            if (remainDays > totalDays) remainDays = totalDays;

            const residualValueOriginal = (price / totalDays) * remainDays;
            const residualValueTarget = residualValueOriginal * exchangeRate;

            document.getElementById('resRemainDays').innerText = remainDays;
            document.getElementById('resValueSymbol').innerText = symbol;
            document.getElementById('resValue').innerText = residualValueTarget.toFixed(2);

            document.getElementById('resActualSymbol').innerText = symbol;
            const premiumWrap = document.getElementById('resPremiumWrap');
            
            if (!isNaN(actualPrice)) {
                document.getElementById('resActual').innerText = actualPrice.toFixed(2);
                const premium = actualPrice - residualValueTarget;
                
                if (premium > 0) {
                    document.getElementById('resPremium').innerText = `+${symbol}${premium.toFixed(2)} (溢价)`;
                    premiumWrap.className = "font-bold text-lg text-red-500";
                } else if (premium < 0) {
                    document.getElementById('resPremium').innerText = `${symbol}${premium.toFixed(2)} (折价)`;
                    premiumWrap.className = "font-bold text-lg text-emerald-500";
                } else {
                    document.getElementById('resPremium').innerText = "原价平出";
                    premiumWrap.className = "font-bold text-lg text-slate-500";
                }
            } else {
                document.getElementById('resActual').innerText = "-";
                document.getElementById('resPremium').innerText = "-";
                premiumWrap.className = "font-bold text-lg text-slate-800";
            }
            saveInputs();
        }

        function copyResultText() {
            const targetCurr = document.getElementById('targetCurrency').value;
            const symbol = currencySymbols[targetCurr] || '';
            const remain = document.getElementById('resRemainDays').innerText;
            const value = document.getElementById('resValue').innerText;
            const actual = document.getElementById('resActual').innerText;
            const premium = document.getElementById('resPremium').innerText;

            if (value === '-') {
                alert("请先进行计算！");
                return;
            }

            let text = `## 剩余价值评估\n\n`;
            text += `| 项目 | 数值 |\n`;
            text += `|------|------|\n`;
            text += `| 剩余天数 | ${remain} 天 |\n`;
            text += `| 剩余价值 | ${symbol}${value} (${targetCurr}) |\n`;
            if (actual !== '-') {
                text += `| 交易金额 | ${symbol}${actual} |\n`;
                text += `| 溢价情况 | ${premium} |\n`;
            }

            const url = new URL(window.location.origin + window.location.pathname);
            STORAGE_KEYS.forEach(id => {
                const el = document.getElementById(id);
                if (el && el.value) url.searchParams.set(id, el.value);
            });
            text += `\n[查看计算](${url.toString()})`;

            navigator.clipboard.writeText(text).then(() => {
                alert("✅ 结果已复制到剪贴板！");
            }).catch(err => {
                alert("❌ 复制失败，请手动记录");
            });
        }

        // --- 快捷键 Enter ---
        document.querySelectorAll('input,select').forEach(el => {
            el.addEventListener('keydown', e => {
                if (e.key === 'Enter') calculate();
            });
        });

        // --- 暗黑模式 ---
        function toggleDark() {
            const html = document.documentElement;
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('calc_darkMode', isDark ? '1' : '0');
            document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
            document.getElementById('moonIcon').classList.toggle('hidden', isDark);
        }

        function initDark() {
            const saved = localStorage.getItem('calc_darkMode');
            const isDark = saved === '1' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.getElementById('sunIcon').classList.remove('hidden');
                document.getElementById('moonIcon').classList.add('hidden');
            }
        }

        // --- Modal 逻辑 ---
        const modal = document.getElementById('currencyModal');
        function openModal() {
            modal.classList.remove('hidden');
            updateModalRateHint();
        }
        function closeModal() {
            modal.classList.add('hidden');
            document.getElementById('convResultBox').classList.add('hidden');
        }
        
        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeModal();
        });

        function swapCurrency() {
            const fromSelect = document.getElementById('convFrom');
            const toSelect = document.getElementById('convTo');
            const temp = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = temp;
            updateModalRateHint();
        }

        document.getElementById('convFrom').addEventListener('change', updateModalRateHint);
        document.getElementById('convTo').addEventListener('change', updateModalRateHint);

        function updateModalRateHint() {
            const fromCurr = document.getElementById('convFrom').value;
            const toCurr = document.getElementById('convTo').value;
            if (Object.keys(globalRates).length > 0) {
                const rateFrom = globalRates[fromCurr];
                const rateTo = globalRates[toCurr];
                const crossRate = rateTo / rateFrom;
                document.getElementById('modalRateHint').innerText = `1 ${fromCurr} = ${crossRate.toFixed(4)} ${toCurr}`;
            }
        }

        function convertCurrency() {
            const amount = parseFloat(document.getElementById('convAmount').value);
            const fromCurr = document.getElementById('convFrom').value;
            const toCurr = document.getElementById('convTo').value;

            if (isNaN(amount)) {
                alert("请输入有效的金额！");
                return;
            }
            if (Object.keys(globalRates).length === 0) {
                alert("汇率尚未加载完成，请稍后再试。");
                return;
            }

            const rateFrom = globalRates[fromCurr];
            const rateTo = globalRates[toCurr];
            const result = (amount / rateFrom) * rateTo;
            
            const symbol = currencySymbols[toCurr] || '';
            document.getElementById('convResultText').innerText = `${symbol} ${result.toFixed(2)}`;
            document.getElementById('convResultBox').classList.remove('hidden');
        }

        // --- 页面初始化 ---
        function init() {
            initDark();
            const hasParams = parseURLParams();
            if (!hasParams) {
                restoreInputs();
            }
            initDefaults();
            addAutoSave();
            fetchRates();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
